  <script>
    const textInput = document.getElementById("text");
    const status = document.getElementById("status");
    const storageKey = "usefultool:word-count:text";
    let current;

    function storageAvailable() {
      try {
        const key = "usefultool:storage-test";
        localStorage.setItem(key, "1");
        localStorage.removeItem(key);
        return true;
      } catch (error) {
        return false;
      }
    }

    const canStoreText = storageAvailable();

    function saveText() {
      if (!canStoreText) return;
      try {
        localStorage.setItem(storageKey, textInput.value);
      } catch (error) {
        UsefulTool.status(status, "Browser storage is full. Current text is not saved for reload.", "warn");
      }
    }

    function restoreText() {
      if (!canStoreText) return false;
      const saved = localStorage.getItem(storageKey);
      if (saved == null) return false;
      textInput.value = saved;
      return true;
    }

    function duration(words, rate) {
      const seconds = Math.ceil(words / rate * 60);
      if (!seconds) return "0 sec";
      if (seconds < 60) return seconds + " sec";
      const minutes = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return minutes + " min" + (remainder ? " " + remainder + " sec" : "");
    }

    function analyze(text) {
      const matches = text.match(/[\p{L}\p{N}]+(?:['’.-][\p{L}\p{N}]+)*/gu) || [];
      const frequencies = new Map();
      matches.forEach((word) => {
        const normalized = word.toLocaleLowerCase();
        frequencies.set(normalized, (frequencies.get(normalized) || 0) + 1);
      });
      let sentences = 0;
      if (text.trim()) {
        if (typeof Intl.Segmenter === "function") {
          sentences = [...new Intl.Segmenter(undefined, { granularity: "sentence" }).segment(text)]
            .filter((part) => /[\p{L}\p{N}]/u.test(part.segment)).length;
        } else {
          sentences = (text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || []).filter((part) => part.trim()).length;
        }
      }
      return {
        words: matches.length,
        characters: [...text].length,
        charactersNoSpaces: [...text.replace(/\s/gu, "")].length,
        sentences,
        paragraphs: text.trim() ? text.trim().split(/\n\s*\n/u).filter((part) => part.trim()).length : 0,
        lines: text ? text.split(/\r\n?|\n/u).length : 0,
        readingTime: duration(matches.length, 200),
        speakingTime: duration(matches.length, 130),
        frequencies: [...frequencies].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0])).slice(0, 10)
      };
    }

    function summary(result) {
      return [
        "Words: " + result.words,
        "Characters: " + result.characters,
        "Characters without spaces: " + result.charactersNoSpaces,
        "Sentences: " + result.sentences,
        "Paragraphs: " + result.paragraphs,
        "Lines: " + result.lines,
        "Reading time: " + result.readingTime,
        "Speaking time: " + result.speakingTime,
        "",
        "Frequent words:",
        ...(result.frequencies.length ? result.frequencies.map(([word, count]) => word + ": " + count) : ["None"])
      ].join("\n");
    }

    function render() {
      current = analyze(textInput.value);
      ["words", "characters", "charactersNoSpaces", "sentences", "paragraphs", "lines", "readingTime", "speakingTime"]
        .forEach((key) => { document.getElementById(key).textContent = current[key]; });
      const body = document.getElementById("frequency");
      body.replaceChildren();
      if (!current.frequencies.length) {
        const row = body.insertRow();
        const cell = row.insertCell();
        cell.colSpan = 2;
        cell.textContent = "No words yet.";
      } else {
        current.frequencies.forEach(([word, count]) => {
          const row = body.insertRow();
          row.insertCell().textContent = word;
          row.insertCell().textContent = count;
        });
      }
    }

    textInput.addEventListener("input", () => { saveText(); render(); });
    document.getElementById("clear").addEventListener("click", () => { textInput.value = ""; saveText(); render(); textInput.focus(); UsefulTool.status(status, "Cleared."); });
    document.getElementById("file").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      textInput.value = await file.text();
      saveText();
      render();
      UsefulTool.status(status, "Loaded " + file.name + ".", "success");
    });
    document.getElementById("copy").addEventListener("click", async () => {
      try { await navigator.clipboard.writeText(summary(current)); UsefulTool.status(status, "Summary copied.", "success"); }
      catch (error) { UsefulTool.status(status, "Clipboard access was denied.", "error"); }
    });
    document.getElementById("download").addEventListener("click", () => {
      UsefulTool.download(new Blob([summary(current)], { type: "text/plain;charset=utf-8" }), "usefultool-word-count.txt");
      UsefulTool.status(status, "Report downloaded.", "success");
    });

    restoreText();
    window.UsefulToolWordCount = { analyze, saveText, restoreText, storageKey };
    render();
  </script>
