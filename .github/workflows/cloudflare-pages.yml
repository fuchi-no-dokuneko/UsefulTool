name: Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f index.html
          test -f image-converter.html
          test -f calculator.html
          test -f unit-converter.html
          test -f metadata-lab.html
          test -f base64-converter.html
          test -f file-diff.html
          test -f rot-cipher.html
          test -f lan-chat.html
          test -f image-editor.html
          test -f pdf-merge.html
          test -f images-to-pdf.html
          test -f toolkit.js
          test -f toolkit.css
          test -f vendor/diff.min.js
          test -f vendor/fabric.min.mjs
          test -f vendor/pdf-lib.min.js
          test -f tests/browser-smoke.html
          test -x serve-local.sh
      - name: Check for external runtime URLs
        run: |
          if grep -RInE 'https?://|//[^ ]+\.[a-zA-Z]{2,}' -- *.html _headers wrangler.toml; then
            echo "External runtime URL found. Keep pages local-only."
            exit 1
          fi
      - name: Check connect-src lock
        run: grep -R "connect-src 'none'" *.html _headers
      - name: Check inline JavaScript syntax
        run: |
          for file in unit-converter.html metadata-lab.html base64-converter.html file-diff.html rot-cipher.html lan-chat.html pdf-merge.html images-to-pdf.html; do
            perl -0777 -ne 'while (/<script>(.*?)<\/script>/sg) { print $1 }' "$file" | node --check
          done
      - name: Run browser smoke tests
        run: |
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/usefultool-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:8765/tests/browser-smoke.html >/dev/null; then
              break
            fi
            sleep 0.2
          done
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          "$browser" --headless --no-sandbox --disable-gpu --disable-dev-shm-usage \
            --virtual-time-budget=8000 --dump-dom \
            http://127.0.0.1:8765/tests/browser-smoke.html > /tmp/usefultool-smoke.html
          grep '<pre id="result">PASS' /tmp/usefultool-smoke.html
          if grep -q '<pre id="result">FAIL' /tmp/usefultool-smoke.html; then
            sed -n '/<pre id="result">/,/<\/pre>/p' /tmp/usefultool-smoke.html
            exit 1
          fi

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Cloudflare deployment config
        id: config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
        run: |
          project_name="${CLOUDFLARE_PROJECT_NAME:-usefultool}"
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "project_name=$project_name" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured; skipping deploy."
          fi
      - name: Deploy to Cloudflare Pages
        if: steps.config.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ steps.config.outputs.project_name }}
